version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    volumes:
      - qims-data:/app/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3100:80"
      - "3101:81"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  qims-data:
