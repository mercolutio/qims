server {
    listen 80;
    server_name _;

    # Auswertung App
    location / {
        root /usr/share/nginx/html/auswertung;
        try_files $uri $uri/ /index.html;
    }

    # API Proxy to Go server
    location /api/ {
        proxy_pass http://server:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

server {
    listen 81;
    server_name _;

    # Messung App on separate port
    location / {
        root /usr/share/nginx/html/messung;
        try_files $uri $uri/ /index.html;
    }

    # API Proxy
    location /api/ {
        proxy_pass http://server:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
